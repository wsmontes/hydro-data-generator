seed: 42
output_format: csv
output_dir: ./output_large

locale: pt_BR

date_range:
  start: "2023-01-01"
  end: "2025-12-31"

volumes:
  transformers: 5000
  consumer_units: 50000
  electricians: 20
  meter_readers: 15
  inspections: 8000
  declared_load_max_per_unit: 4
  max_work_orders_per_unit: 3

fraud:
  fraud_rate: 0.08
  gradual_drop_pct: 0.40
  electrician_correlation_pct: 0.30
  reader_corruption_pct: 0.20
  network_clusters: 3
  recurrence_rate: 0.10

reading_occurrence_rate: 0.10
meter_image_rate: 0.20

# ---------------------------------------------------------------------------
# Dados externos (gerados por generate_external.py)
# ---------------------------------------------------------------------------
external:
  companies_extra_pct: 0.15          # 15% empresas extras além dos PJ existentes
  qsa_pf_participation_pct: 0.30     # 30% dos PF viram sócios
  sanction_rate: 0.03                # 3% taxa geral de sanção
  sanction_fraud_boost: 0.40         # 40% dos fraudulentos sancionados
  fraud_score_coverage: 1.0          # 100% dos CPF/CNPJ passam por scoring
  legal_process_rate: 0.08           # 8% envolvidos em processos
  legal_fraud_boost_factor: 3        # 3x mais processos para fraudulentos
  debt_rate: 0.12                    # 12% com dívidas
  debt_fraud_correlation: 0.60       # 60% dos fraudulentos com dívida
  osint_rate: 0.04                   # 4% com eventos OSINT
  osint_sanction_boost: 0.70         # 70% dos sancionados com evento OSINT
