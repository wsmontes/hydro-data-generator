seed: 42
output_format: csv   # csv ou parquet
output_dir: ./output
locale: pt_BR

date_range:
  start: "2023-01-01"
  end: "2025-12-31"

volumes:
  transformers: 50
  consumer_units: 500
  electricians: 20
  meter_readers: 15
  inspections: 80
  declared_load_max_per_unit: 4
  max_work_orders_per_unit: 3

fraud:
  fraud_rate: 0.08               # 8% das UCs têm padrão suspeito
  gradual_drop_pct: 0.40         # 40% da fraude = queda gradual no consumo
  electrician_correlation_pct: 0.30  # 30% correlacionado a eletricista
  reader_corruption_pct: 0.20    # 20% = leiturista suspeito
  network_clusters: 3            # grupos de fraude conectados (para grafo)
  recurrence_rate: 0.10          # 10% das inspeções são reincidentes

reading_occurrence_rate: 0.10    # % das leituras que geram ocorrência
meter_image_rate: 0.20           # % das leituras com imagem registrada

external:
  companies_extra_pct: 0.15
  qsa_pf_participation_pct: 0.30
  sanction_rate: 0.03
  sanction_fraud_boost: 0.40
  fraud_score_coverage: 1.0
  legal_process_rate: 0.08
  legal_fraud_boost_factor: 3
  debt_rate: 0.12
  debt_fraud_correlation: 0.60
  osint_rate: 0.04
  osint_sanction_boost: 0.70
